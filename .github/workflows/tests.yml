name: Tests

on:
  push:
    branches: [main, ci-test-*]
  pull_request:
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout badge repo matching PR branch when available
      run: |
        BRANCH="${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}"
        if git ls-remote --exit-code --heads https://github.com/TeamRobotmad/badge-2024-software.git "$BRANCH"; then
          echo "REF=$BRANCH" >> "$GITHUB_ENV"
        else
          echo "REF=" >> "$GITHUB_ENV"
        fi

    - uses: actions/checkout@v4
      with:
        repository: TeamRobotmad/badge-2024-software
        ref: ${{ env.REF }}

    - name: Manage submodule
      run: |
        git submodule update --init --force --remote
        cd ./sim/apps/HexManager
        BRANCH="${{ github.head_ref || github.ref_name }}"
        git fetch origin
        if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
          git checkout -B "$BRANCH" "origin/$BRANCH"
        else
          echo "Branch '$BRANCH' not found in submodule; using recorded submodule commit."
        fi

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ./sim/requirements.txt
        pip install pytest
    - name: Run the tests
      run: |
        cd ./sim/apps/HexManager
        pytest tests
